const formatVolume = v => {
  const n=parseFloat(v);if(!n)return"N/A";
  if(n>=1e9)return(n/1e9).toFixed(2)+"B";
  if(n>=1e6)return(n/1e6).toFixed(2)+"M";
  if(n>=1e3)return(n/1e3).toFixed(2)+"K";
  return String(n);
};
const formatMarketCap = v => {
  const n=parseFloat(v);if(!n)return"N/A";
  if(n>=1e12)return(n/1e12).toFixed(2)+"T";
  if(n>=1e9)return(n/1e9).toFixed(2)+"B";
  if(n>=1e6)return(n/1e6).toFixed(2)+"M";
  return String(n);
};

const genSeries=(base,n=120)=>{let p=base*0.55;return Array.from({length:n},()=>{p=p*(1+0.0006+(Math.random()-0.485)*0.02);return p;});};

function LineChart({series,width=420,height=200}){
  const pad={l:8,r:44,t:12,b:32};
  const w=width-pad.l-pad.r,h=height-pad.t-pad.b;
  const minP=Math.min(...series),maxP=Math.max(...series),range=maxP-minP||1;
  const px=i=>pad.l+(i/(series.length-1))*w;
  const py=p=>pad.t+((maxP-p)/range)*h;
  const linePath=series.map((p,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(" ");
  const areaPath=`${linePath} L${px(series.length-1)},${pad.t+h} L${px(0)},${pad.t+h} Z`;
  const step=(maxP-minP)/5;
  const yTicks=Array.from({length:6},(_,i)=>parseFloat((minP+i*step).toFixed(1)));
  const xLabels=["Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb"];
  const tipIdx=Math.floor(series.length*0.3);
  const tipX=px(tipIdx),tipY=py(series[tipIdx]);
  return(
    <svg width={width} height={height} style={{display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#2255aa" stopOpacity="0.5"/>
          <stop offset="100%" stopColor="#112244" stopOpacity="0.05"/>
        </linearGradient>
        <clipPath id="chartClip"><rect x={pad.l} y={pad.t} width={w} height={h}/></clipPath>
      </defs>
      {yTicks.map(v=>(
        <g key={v}>
          <line x1={pad.l} x2={pad.l+w} y1={py(v)} y2={py(v)} stroke="#1e1e1e" strokeDasharray="1,4"/>
          <text x={pad.l+w+4} y={py(v)+4} fill={C.textDim} fontSize={9} fontFamily="monospace">{v}</text>
        </g>
      ))}
      <path d={areaPath} fill="url(#areaGrad)" clipPath="url(#chartClip)"/>
      <path d={linePath} fill="none" stroke="#3377cc" strokeWidth={1.5} clipPath="url(#chartClip)"/>
      <line x1={tipX} x2={tipX} y1={pad.t} y2={pad.t+h} stroke="#555" strokeWidth={1} strokeDasharray="2,3"/>
      <rect x={tipX+4} y={tipY-20} width={64} height={28} fill="#1a1a1a" stroke="#333" strokeWidth={1} rx={1}/>
      <text x={tipX+8} y={tipY-7} fill={C.textDim} fontSize={9} fontFamily="monospace">Apr/24</text>
      <text x={tipX+8} y={tipY+5} fill={C.textWhite} fontSize={10} fontFamily="monospace" fontWeight="bold">${series[tipIdx].toFixed(2)}</text>
      <circle cx={tipX} cy={tipY} r={3} fill="#3377cc" stroke="#6699ee" strokeWidth={1}/>
      {xLabels.map((lbl,i)=>(
        <text key={lbl} x={pad.l+(i/(xLabels.length-1))*w} y={height-6} fill={C.textDim} fontSize={8} fontFamily="monospace" textAnchor="middle">{lbl}</text>
      ))}
    </svg>
  );
}

function Sparkline({series,isUp}){
  const width=55,height=18;
  const minP=Math.min(...series),maxP=Math.max(...series),range=maxP-minP||1;
  const px=i=>(i/(series.length-1))*width;
  const py=p=>height-((p-minP)/range)*height;
  const path=series.map((p,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(" ");
  return <svg width={width} height={height} style={{display:"inline-block",verticalAlign:"middle"}}><path d={path} fill="none" stroke={isUp?C.textGreenBright:C.textRed} strokeWidth={1.5}/></svg>;
}

function TickerTape(){
  const [offset,setOffset]=useState(0);
  const tapeData=useMemo(()=>{
    const syms=["AAPL","MSFT","GOOGL","AMZN","TSLA","META","NVDA","AMD","JPM","BAC","NFLX","V","MA","WMT","DIS"];
    return syms.map(sym=>{const price=80+Math.random()*400;const change=(Math.random()-0.48)*12;return{sym,price:price.toFixed(2),change:change.toFixed(2),pct:((change/price)*100).toFixed(2),up:change>=0};});
  },[]);
  useEffect(()=>{const id=setInterval(()=>setOffset(o=>o-0.6),16);return()=>clearInterval(id);},[]);
  const itemW=185,total=tapeData.length*itemW;
  const norm=((offset%total)-total)%total;
  return(
    <div style={{background:"#080808",borderTop:"1px solid #1a1a1a",height:22,overflow:"hidden",position:"relative",flexShrink:0}}>
      <div style={{position:"absolute",display:"flex",transform:`translateX(${norm}px)`,alignItems:"center",height:"100%",whiteSpace:"nowrap"}}>
        {[...tapeData,...tapeData,...tapeData].map((item,i)=>(
          <div key={i} style={{width:itemW,display:"flex",gap:5,alignItems:"center",fontFamily:"monospace",fontSize:10,padding:"0 8px"}}>
            <span style={{color:C.textWhite,fontWeight:"bold"}}>{item.sym}</span>
            <span style={{color:C.textDimMid}}>{item.price}</span>
            <span style={{color:item.up?C.textGreenBright:C.textRed}}>{item.up?"+":""}{item.change}</span>
            <span style={{color:item.up?C.textGreenBright:C.textRed}}>({item.up?"+":""}{item.pct}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    <span style={{color:"#555",fontSize:11}}>{num})</span>

    {cmd&&<span style={{color:C.textBlue,fontSize:10}}>| {cmd} »</span>}

function DRow({label,value,valueColor,children,noColon,indent}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"3px 10px",borderBottom:"1px solid #161616"}}>
    {!noColon?<span style={{color:"#666",fontSize:11,paddingLeft:indent?14:0}}>{label}</span>:<span/>}
    {children||<span style={{color:valueColor||"#aaaaaa",fontSize:11,fontFamily:"monospace"}}>{value}</span>}
  </div>;
}

        if(!d)return d;

        return{...d,price:np,change:(nc>=0?"+":"")+nc.toFixed(2),changePct:(nc>=0?"+":"")+((nc/origOpen)*100).toFixed(2)+"%"};

          </div>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setActiveTab(i)} style={{background:activeTab===i?C.tabActiveBg:"transparent",color:activeTab===i?C.tabActiveText:C.tabInactiveText,border:"none",borderRight:"1px solid #1e1e1e",fontFamily:"'Courier New',Courier,monospace",fontSize:11,padding:"5px 10px",cursor:"pointer",fontWeight:activeTab===i?"bold":"normal"}}>
              [{i}] {t}
            </button>
          ))}
        </div>
      )}

      <div style={{background:"#0f0f0f",borderBottom:"1px solid #1e1e1e",padding:"4px 14px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
        <span style={{color:"#666",fontSize:11}}>▶</span>
        <input value={tickerInput} onChange={e=>setTickerInput(e.target.value.toUpperCase().replace(/[^A-Z]/g,""))}
          onKeyDown={e=>e.key==="Enter"&&load(tickerInput)}
          placeholder="Digite o ticker: AAPL, MSFT, TSLA, META, NVDA, AMZN, GOOGL..."
          style={{background:"transparent",border:"none",outline:"none",color:C.textWhite,fontFamily:"'Courier New',Courier,monospace",fontSize:12,flex:1}}/>
        <button onClick={()=>load(tickerInput)} style={{background:"#1e3a1e",border:"1px solid #33cc66",color:C.textGreen,fontFamily:"monospace",fontSize:10,padding:"2px 14px",cursor:"pointer"}}>GO</button>
      </div>

      {loading&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{color:C.textGreen,fontSize:13,letterSpacing:2}}>CARREGANDO...</div>
        </div>
      )}

      {data&&!loading&&activeTab===1&&(
        <div style={{flex:1,overflowY:"auto"}}>
          <div style={{padding:"8px 14px 0",borderBottom:"1px solid #1e1e1e"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
              <span style={{color:C.textYellow,fontSize:14,fontWeight:"bold",letterSpacing:1}}>{data.name}</span>
              <span style={{color:"#666",fontSize:10}}>FIGI {data.figi}</span>
            </div>
            <div style={{color:"#999",fontSize:11,lineHeight:1.75,paddingBottom:10}}>{data.description}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:"1px solid #1e1e1e"}}>
            <div style={{borderRight:"1px solid #1e1e1e"}}>
              <Row num="8" label="Price Chart" cmd="GP"/>
              <div style={{background:C.bgChart,padding:"4px 0 0"}}><LineChart series={series} width={420} height={200}/></div>
            </div>
            <div style={{borderRight:"1px solid #1e1e1e"}}>
              <Row num="9" label="Estimates" cmd="EE"/>
              <DRow label="P/E" value={data.pe}/>
              <DRow label="Est P/E" value={data.estPe}/>
              <DRow label="T12M EPS (USD)" value={data.eps}/>
              <DRow label="Est EPS" value={data.estEps}/>
              <DRow label="Est PEG" value={data.peg}/>
              <Row num="12" label="Dividend" cmd="DVD"/>
              <DRow label="Ind Gross Yield" value={data.divYield}/>
              <div style={{padding:"4px 10px"}}><span style={{color:"#666",fontSize:10}}>{data.divNote}</span></div>
            </div>
            <div>
              <Row num="13" label="Corporate Info"/>
              <DRow label="Website" noColon><span style={{color:C.textBlue,fontSize:11}}>{data.website}</span></DRow>
              <DRow label="" value={data.headquarters} indent/>
              <DRow label="Employees" value={data.employees}/>
              <Row num="15" label="Management" cmd="MGMT"/>
              <div style={{padding:"4px 10px"}}>
                <div style={{color:C.textYellow,fontSize:11,fontWeight:"bold"}}>{data.ceo}</div>
                <div style={{color:"#666",fontSize:10,paddingLeft:14}}>{data.ceoTitle}</div>
              </div>
              <div style={{padding:"2px 10px 4px"}}>
                <div style={{color:C.textYellow,fontSize:11}}>{data.cfo}</div>
                <div style={{color:"#666",fontSize:10,paddingLeft:14}}>{data.cfoTitle}</div>
              </div>
              <div style={{borderTop:"1px solid #1e1e1e"}}>
                <DRow label="12M Tot Ret" value={data.totRet12m} valueColor={C.textGreenBright}/>
                <DRow label="Beta vs SPX" value={data.betaVsSPX}/>
                <DRow label="52W High" value={data.h52} valueColor={C.textGreenBright}/>
                <DRow label="52W Low" value={data.l52} valueColor={C.textRed}/>
              </div>
            </div>
          </div>
          {news.map(n=>(
            <div key={n.id} style={{display:"flex",gap:8,padding:"3px 14px",borderBottom:"1px solid #161616",cursor:"pointer"}}>
              <span style={{color:"#666",fontSize:10,minWidth:28}}>{n.id}</span>
              <span style={{color:"#666",fontSize:10,minWidth:60}}>{n.src} {n.time}</span>
              <span style={{color:"#3377cc",fontSize:10}}>{n.text}</span>
            </div>
          ))}
        </div>
      )}

      {data&&!loading&&activeTab===2&&(
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,maxWidth:780}}>
            <div style={{border:"1px solid #1e1e1e"}}>
              <Row num="1" label="Valuation Multiples"/>
              {[["P/E (TTM)",data.pe],["P/S (TTM)",(parseFloat(data.pe)/20).toFixed(2)],["EV/EBITDA",(parseFloat(data.pe)*0.75).toFixed(2)]].map(([l,v])=><DRow key={l} label={l} value={v}/>)}
            </div>
            <div style={{border:"1px solid #1e1e1e"}}>
              <Row num="2" label="Returns & Risk"/>
              {[["YTD Return",data.ytd,C.textGreenBright],["12M Total Return",data.totRet12m,C.textGreenBright],["Beta vs SPX",data.betaVsSPX,C.textWhite]].map(([l,v,col])=><DRow key={l} label={l} value={v} valueColor={col}/>)}
            </div>
          </div>
        </div>
      )}

      {data&&!loading&&activeTab===5&&(
        <div style={{flex:1,overflowY:"auto"}}>
          <Row num="1" label={`Latest News — ${data.ticker}`}/>
          {news.map(n=>(
            <div key={n.id} style={{display:"flex",gap:10,padding:"5px 14px",borderBottom:"1px solid #161616",cursor:"pointer"}}>
              <span style={{color:"#666",fontSize:10,minWidth:28}}>{n.id}</span>
              <span style={{color:"#446688",fontSize:10,minWidth:60}}>{n.src}</span>
              <span style={{color:"#666",fontSize:10,minWidth:40}}>{n.time}</span>
              <span style={{color:C.textGreen,fontSize:11}}>{n.text}</span>
            </div>
          ))}
        </div>
      )}

      {data&&!loading&&![1,2,5].includes(activeTab)&&(
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{color:C.textYellow,fontSize:14,marginBottom:8}}>[{activeTab}] {TABS[activeTab]}</div>
            <div style={{color:"#666",fontSize:11}}>Abas disponíveis: [1] OVERVIEW · [2] ANALYSIS · [5] NEWS</div>
          </div>
        </div>
      )}

      <TickerTape/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

  const w=width-pad.l-pad.r,h=height-pad.t-pad.b;
  const minP=Math.min(...series),maxP=Math.max(...series),range=maxP-minP||1;
  const px=i=>pad.l+(i/(series.length-1))*w;
  const py=p=>pad.t+((maxP-p)/range)*h;
  const linePath=series.map((p,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(" ");
  const areaPath=`${linePath} L${px(series.length-1)},${pad.t+h} L${px(0)},${pad.t+h} Z`;
  const step=(maxP-minP)/5;
  const yTicks=Array.from({length:6},(_,i)=>parseFloat((minP+i*step).toFixed(1)));
  const xLabels=["Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb"];
  const tipIdx=Math.floor(series.length*0.3);
  const tipX=px(tipIdx),tipY=py(series[tipIdx]);
  return(
    <svg width={width} height={height} style={{display:"block",overflow:"visible"}}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#2255aa" stopOpacity="0.5"/>
          <stop offset="100%" stopColor="#112244" stopOpacity="0.05"/>
        </linearGradient>
        <clipPath id="chartClip"><rect x={pad.l} y={pad.t} width={w} height={h}/></clipPath>
      </defs>
      {yTicks.map(v=>(<g key={v}><line x1={pad.l} x2={pad.l+w} y1={py(v)} y2={py(v)} stroke={C.border} strokeDasharray="1,4"/><text x={pad.l+w+4} y={py(v)+4} fill={C.textDim} fontSize={9} fontFamily="monospace">{v}</text></g>))}
      <path d={areaPath} fill="url(#areaGrad)" clipPath="url(#chartClip)"/>
      <path d={linePath} fill="none" stroke="#3377cc" strokeWidth={1.5} clipPath="url(#chartClip)"/>
      <line x1={tipX} x2={tipX} y1={pad.t} y2={pad.t+h} stroke="#555" strokeWidth={1} strokeDasharray="2,3"/>
      <rect x={tipX+4} y={tipY-20} width={64} height={28} fill="#1a1a1a" stroke="#333" strokeWidth={1} rx={1}/>
      <text x={tipX+8} y={tipY-7} fill={C.textDim} fontSize={9} fontFamily="monospace">Apr/24</text>
      <text x={tipX+8} y={tipY+5} fill={C.textWhite} fontSize={10} fontFamily="monospace" fontWeight="bold">${series[tipIdx].toFixed(2)}</text>
      <circle cx={tipX} cy={tipY} r={3} fill="#3377cc" stroke="#6699ee" strokeWidth={1}/>
      {xLabels.map((lbl,i)=>(<text key={lbl} x={pad.l+(i/(xLabels.length-1))*w} y={height-6} fill={C.textDim} fontSize={8} fontFamily="monospace" textAnchor="middle">{lbl}</text>))}
    </svg>
  );
}

function Sparkline({series,isUp}){
  const width=55,height=18;
  const minP=Math.min(...series),maxP=Math.max(...series),range=maxP-minP||1;
  const px=i=>(i/(series.length-1))*width;
  const py=p=>height-((p-minP)/range)*height;
  const path=series.map((p,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(p).toFixed(1)}`).join(" ");
  return <svg width={width} height={height} style={{display:"inline-block",verticalAlign:"middle"}}><path d={path} fill="none" stroke={isUp?"#44dd77":"#ff3333"} strokeWidth={1.5}/></svg>;
}

function App(){
  const [tickerInput,setTickerInput]=useState("NVDA");
  const [activeTab,setActiveTab]=useState(0);
  const [loading,setLoading]=useState(false);
  const [data,setData]=useState(null);
  const [series,setSeries]=useState(()=>genSeries(127));
  const [clock,setClock]=useState(new Date());
  const [themeKey,setThemeKey]=useState("dark");
  const C=THEMES[themeKey];

  useEffect(()=>{const id=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(id);},[]);

  useEffect(()=>{
    if(!data)return;
    const id=setInterval(()=>{
      setData(d=>{
        if(!d)return d;
        const base=parseFloat(String(d.price).replace(/,/g,""));
        const delta=(Math.random()-0.499)*base*0.0002;
        const np=base+delta;
        const origOpen=parseFloat(String(d.open).replace(/,/g,""));
        const nc=np-origOpen;
        const fmt=np>1000?np.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):np.toFixed(2);
        return{...d,price:fmt,change:(nc>=0?"+":"")+nc.toFixed(2),changePct:(nc>=0?"+":"")+((nc/origOpen)*100).toFixed(2)+"%"};
      });
    },3000);
    return()=>clearInterval(id);
  },[data?.ticker]);

  useEffect(()=>{
    const handler=e=>{
      if(e.target.tagName==="INPUT")return;
      const n=parseInt(e.key);
      if(!isNaN(n)&&n>=0&&n<=6)setActiveTab(n);
      if(e.key==="t"||e.key==="T")setThemeKey(k=>k==="dark"?"light":"dark");
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  const load=useCallback(sym=>{
    const s=sym.trim().toUpperCase();if(!s)return;
    setLoading(true);
    setTimeout(()=>{const d=getFallback(s);setData(d);setSeries(genSeries(parseFloat(String(d.price).replace(/,/g,""))));setActiveTab(1);setLoading(false);},500);
  },[]);

  useEffect(()=>{load("NVDA");},[]);

  const fmt2=n=>String(n).padStart(2,"0");
  const timeStr=`${fmt2(clock.getHours())}:${fmt2(clock.getMinutes())}:${fmt2(clock.getSeconds())}`;
  const isUp=data?parseFloat(String(data.change).replace(/,/g,""))>=0:true;
  const news=makeNews(data?.ticker||"NVDA");
  const currSym=data?.currency==="BRL"?"R$":"$";

  const tabContent=()=>{
    if(!data||loading)return null;
    switch(activeTab){
      case 0:return <HomeTab C={C} onLoad={load}/>;
      case 1:return(
        <div style={{flex:1,overflowY:"auto"}}>
          <div style={{padding:"8px 14px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
              <span style={{color:C.textYellow,fontSize:14,fontWeight:"bold",letterSpacing:1}}>{data.name}</span>
              <span style={{color:C.textDim,fontSize:10}}>FIGI {data.figi}</span>
            </div>
            <div style={{display:"flex",gap:16,marginBottom:4}}>
              <span style={{color:C.textDim,fontSize:10}}>Sector: <span style={{color:C.textCyan}}>{data.sector}</span></span>
              <span style={{color:C.textDim,fontSize:10}}>Industry: <span style={{color:C.textCyan}}>{data.industry}</span></span>
              <span style={{color:C.textDim,fontSize:10}}>Type: <span style={{color:C.textCyan}}>{data.assetType}</span></span>
              <span style={{color:C.textDim,fontSize:10}}>Currency: <span style={{color:C.textCyan}}>{data.currency}</span></span>
            </div>
            <div style={{color:C.textDimMid,fontSize:11,lineHeight:1.75,paddingBottom:10}}>{data.description}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",borderBottom:`1px solid ${C.border}`}}>
            <div style={{borderRight:`1px solid ${C.border}`}}>
              <Row num="8" label="Price Chart" cmd="GP" C={C}/>
              <div style={{background:C.bgChart,padding:"4px 0 0"}}><LineChart series={series} width={420} height={200} C={C}/></div>
            </div>
            <div style={{borderRight:`1px solid ${C.border}`}}>
              <Row num="9" label="Estimates" cmd="EE" C={C}/>
              <DRow label="P/E" value={data.pe} C={C}/>
              <DRow label="Est P/E" value={data.estPe} C={C}/>
              <DRow label="T12M EPS" value={`${currSym}${data.eps}`} C={C}/>
              <DRow label="Est EPS" value={`${currSym}${data.estEps}`} C={C}/>
              <DRow label="Est PEG" value={data.peg} C={C}/>
              <Row num="12" label="Dividend" cmd="DVD" C={C}/>
              <DRow label="Ind Gross Yield" value={data.divYield} C={C}/>
              <div style={{padding:"4px 10px"}}><span style={{color:C.textDim,fontSize:10}}>{data.divNote}</span></div>
            </div>
            <div>
              <Row num="13" label="Corporate Info" C={C}/>
              <DRow label="Website" noColon C={C}><span style={{color:C.textBlue,fontSize:11}}>{data.website}</span></DRow>
              <DRow label="" value={data.headquarters} indent C={C}/>
              <DRow label="Employees" value={data.employees} C={C}/>
              <Row num="15" label="Management" cmd="MGMT" C={C}/>
              <div style={{padding:"4px 10px"}}>
                <div style={{color:C.textYellow,fontSize:11,fontWeight:"bold"}}>{data.ceo}</div>
                <div style={{color:C.textDim,fontSize:10,paddingLeft:14}}>{data.ceoTitle}</div>
              </div>
              <div style={{padding:"2px 10px 4px"}}>
                <div style={{color:C.textYellow,fontSize:11}}>{data.cfo}</div>
                <div style={{color:C.textDim,fontSize:10,paddingLeft:14}}>{data.cfoTitle}</div>
              </div>
              <div style={{borderTop:`1px solid ${C.border}`}}>
                <DRow label="12M Tot Ret" value={data.totRet12m} valueColor={parseFloat(data.totRet12m)>=0?C.textGreenBright:C.textRed} C={C}/>
                <DRow label="Beta vs SPX" value={data.betaVsSPX} C={C}/>
                <DRow label="52W High" value={data.h52} valueColor={C.textGreenBright} C={C}/>
                <DRow label="52W Low" value={data.l52} valueColor={C.textRed} C={C}/>
              </div>
            </div>
          </div>
          {news.map(n=>(<div key={n.id} style={{display:"flex",gap:8,padding:"3px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}><span style={{color:C.textDim,fontSize:10,minWidth:28}}>{n.id}</span><span style={{color:C.textDim,fontSize:10,minWidth:60}}>{n.src} {n.time}</span><span style={{color:C.textBlue,fontSize:10}}>{n.text}</span></div>))}
        </div>
      );
      case 2:return(
        <div style={{flex:1,overflowY:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr"}}>
            <div style={{borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`}}>
              <Row num="1" label="Valuation Multiples" C={C}/>
              {[["P/E (TTM)",data.pe],["P/S (TTM)",(parseFloat(data.pe)/20).toFixed(2)],["EV/EBITDA",(parseFloat(data.pe)*0.75).toFixed(2)],["P/B",(parseFloat(data.pe)/8).toFixed(2)],["P/FCF",(parseFloat(data.pe)*1.2).toFixed(2)]].map(([l,v])=>(<DRow key={l} label={l} value={v} C={C}/>))}
            </div>
            <div style={{borderBottom:`1px solid ${C.border}`}}>
              <Row num="2" label="Returns & Risk" C={C}/>
              {[["YTD Return",data.ytd,parseFloat(data.ytd)>=0?C.textGreenBright:C.textRed],["12M Total Return",data.totRet12m,parseFloat(data.totRet12m)>=0?C.textGreenBright:C.textRed],["Beta vs SPX",data.betaVsSPX,C.textWhite],["52W High",data.h52,C.textGreenBright],["52W Low",data.l52,C.textRed]].map(([l,v,col])=>(<DRow key={l} label={l} value={v} valueColor={col} C={C}/>))}
            </div>
            <div style={{borderRight:`1px solid ${C.border}`}}>
              <Row num="3" label="Per Share Data" C={C}/>
              {[["EPS (TTM)",`${currSym}${data.eps}`],["Est EPS",`${currSym}${data.estEps}`],["Est PEG",data.peg],["Div Yield",data.divYield]].map(([l,v])=>(<DRow key={l} label={l} value={v} C={C}/>))}
            </div>
            <div>
              <Row num="4" label="Capital Structure" C={C}/>
              {[["Market Cap",formatMarketCap(data.mktcap)],["Shares Out.",data.sharesOut?.split("/")[0]?.trim()],["Float",data.sharesOut?.split("/")[1]?.trim()],["SI % Float",data.siOfFloat?.split("/")[0]?.trim()],["Days to Cover",data.daysToCover]].map(([l,v])=>(<DRow key={l} label={l} value={v} C={C}/>))}
            </div>
          </div>
        </div>
      );
      case 3:return <RelIndexTab data={data} C={C}/>;
      case 4:return <RelValueTab data={data} C={C}/>;
      case 5:return(
        <div style={{flex:1,overflowY:"auto"}}>
          <Row num="1" label={`Latest News — ${data.ticker}`} C={C}/>
          {news.map(n=>(<div key={n.id} style={{display:"flex",gap:10,padding:"5px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}><span style={{color:C.textDim,fontSize:10,minWidth:28}}>{n.id}</span><span style={{color:C.textBlue,fontSize:10,minWidth:60}}>{n.src}</span><span style={{color:C.textDim,fontSize:10,minWidth:40}}>{n.time}</span><span style={{color:C.textGreen,fontSize:11}}>{n.text}</span></div>))}
        </div>
      );
      case 6:return <OwnershipTab data={data} C={C}/>;
      default:return null;
    }
  };

  return(
    <div style={{background:C.bgMain,height:"100vh",display:"flex",flexDirection:"column",fontFamily:"'Courier New',Courier,monospace",overflow:"hidden"}}>
      <div style={{height:4,background:"linear-gradient(to right,#cc1100,#880000,#330000,#111)",flexShrink:0}}/>
      <div style={{background:C.bgHeader,borderBottom:`1px solid ${C.border}`,padding:"6px 14px",display:"flex",alignItems:"center",flexShrink:0}}>
        <span style={{color:C.textYellow,fontSize:13,fontWeight:"bold",letterSpacing:2,marginRight:"auto"}}>▐ AURA TERMINAL</span>
        {data&&<span style={{color:C.textDim,fontSize:11,marginRight:20}}>{data.ticker} {data.exchange} {data.assetType} | {data.classification}</span>}
        <button onClick={()=>setThemeKey(k=>k==="dark"?"light":"dark")} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,fontFamily:"monospace",fontSize:9,padding:"1px 8px",cursor:"pointer",marginRight:14}}>
          {themeKey==="dark"?"☀ LIGHT":"☾ DARK"}
        </button>
        <span style={{color:C.liveDot,fontSize:10,marginRight:4}}>●</span>
        <span style={{color:C.textWhite,fontSize:11,fontWeight:"bold",marginRight:14}}>LIVE</span>
        <span style={{color:C.textDim,fontSize:11}}>{timeStr}</span>
      </div>

      {data&&(
        <div style={{background:"#0a0a0a",borderBottom:`1px solid ${C.border}`,padding:"5px 14px",display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
          <span style={{color:C.textWhite,fontSize:13,fontWeight:"bold"}}>{data.ticker} {data.exchange}</span>
          <span style={{color:isUp?C.textGreenBright:C.textRed,fontSize:16,fontWeight:"bold"}}>{currSym}{data.price}</span>
          <span style={{color:isUp?C.textGreenBright:C.textRed,fontSize:12}}>{getChangeSymbol(data.change)} {data.change} ({data.changePct})</span>
          <Sparkline series={series.slice(-25)} isUp={isUp}/>
          <div style={{marginLeft:"auto",display:"flex",gap:0,alignItems:"center"}}>
            <span style={{color:C.textDim,fontSize:10}}>Vol </span><span style={{color:C.textWhite,fontSize:10,marginRight:10}}>&nbsp;{formatVolume(data.volume)}</span>
            <span style={{color:C.textDim,fontSize:10}}>O </span><span style={{color:C.textWhite,fontSize:10,marginRight:10}}>&nbsp;{data.open}</span>
            <span style={{color:C.textDim,fontSize:10}}>H </span><span style={{color:C.textGreenBright,fontSize:10,marginRight:10}}>&nbsp;{data.high}</span>
            <span style={{color:C.textDim,fontSize:10}}>L </span><span style={{color:C.textRed,fontSize:10,marginRight:14}}>&nbsp;{data.low}</span>
            <span style={{color:C.textDim,fontSize:10}}>Mkt Cap </span><span style={{color:C.textWhite,fontSize:10,marginRight:14}}>&nbsp;{formatMarketCap(data.mktcap)}</span>
            <span style={{background:C.openBadge,color:"#000",fontSize:10,fontWeight:"bold",padding:"1px 8px"}}>OPEN</span>
          </div>
        </div>
      )}

      {data&&(
        <div style={{background:C.bgTabBar,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"stretch",flexShrink:0}}>
          <div style={{padding:"5px 12px",borderRight:`1px solid ${C.border}`,color:C.textDimMid,fontSize:11,display:"flex",alignItems:"center",background:C.bgSection}}>
            {data.ticker} {data.exchange} {data.assetType}
          </div>
          {TABS.map((t,i)=>(
            <button key={t} onClick={()=>setActiveTab(i)} style={{background:activeTab===i?C.tabActiveBg:"transparent",color:activeTab===i?C.tabActiveText:C.tabInactiveText,border:"none",borderRight:`1px solid ${C.border}`,fontFamily:"'Courier New',Courier,monospace",fontSize:11,padding:"5px 10px",cursor:"pointer",fontWeight:activeTab===i?"bold":"normal"}}>
              [{i}] {t}
            </button>
          ))}
        </div>
      )}

      <div style={{background:"#0f0f0f",borderBottom:`1px solid ${C.border}`,padding:"4px 14px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
        <span style={{color:C.textDim,fontSize:11}}>▶</span>
        <input value={tickerInput} onChange={e=>setTickerInput(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}
          onKeyDown={e=>e.key==="Enter"&&load(tickerInput)}
          placeholder="NVDA AAPL MSFT TSLA META AMZN GOOGL AMD JPM NFLX | PETR4 VALE3 ITUB4 BBDC4 WEGE3 | BTC ETH SOL | SPX NDX IBOV | XAUUSD USDBRL"
          style={{background:"transparent",border:"none",outline:"none",color:C.textWhite,fontFamily:"'Courier New',Courier,monospace",fontSize:12,flex:1}}/>
        <button onClick={()=>load(tickerInput)} style={{background:"#1e3a1e",border:`1px solid ${C.textGreen}`,color:C.textGreen,fontFamily:"monospace",fontSize:10,padding:"2px 14px",cursor:"pointer"}}>GO</button>
        <span style={{color:C.textDim,fontSize:9}}>[T]=theme</span>
      </div>

      {loading&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{color:C.textGreen,fontSize:13,letterSpacing:2}}>LOADING...</div>
        </div>
      )}

      {!loading&&(!data?<HomeTab C={C} onLoad={load}/>:tabContent())}

      <TickerTape C={C}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
